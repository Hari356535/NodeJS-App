name: JS/TS Security Scan

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  security_scan:
    name: JavaScript / TypeScript Security Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

      ###################################################
      # Checkout
      ###################################################

      - name: Checkout repository
        uses: actions/checkout@v4

      ###################################################
      # Setup Node
      ###################################################

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      ###################################################
      # Install dependencies safely
      ###################################################

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts

      ###################################################
      # Run Semgrep SAST
      ###################################################

      - name: Run Semgrep scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit
          generateSarif: true

      ###################################################
      # Upload Semgrep results
      ###################################################

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

      ###################################################
      # Run Bearer security scanner
      ###################################################

      - name: Run Bearer scan
        uses: bearer/bearer-action@v2
        continue-on-error: true
        with:
          scanner: sast,secrets
          severity: critical,high,medium
          format: sarif
          output: bearer-results.sarif

      ###################################################
      # Upload Bearer SARIF results
      ###################################################

      - name: Upload Bearer SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bearer-results.sarif
