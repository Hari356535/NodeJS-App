name: Security Scan

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  security_scan:
    name: JS/TS Security Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

      #####################################
      # Checkout
      #####################################

      - name: Checkout repository
        uses: actions/checkout@v4

      #####################################
      # Setup Node
      #####################################

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      #####################################
      # Safe Dependency Install
      #####################################

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts

      #####################################
      # Semgrep SAST Scanner
      #####################################

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit

      #####################################
      # Bearer Security Scanner
      #####################################

      - name: Run Bearer Scan
        uses: bearer/bearer-action@v2
        with:
          scanner: sast,secrets
          severity: critical,high,medium
          format: sarif
          output: bearer-results.sarif

      #####################################
      # Upload Bearer results to GitHub Security
      #####################################

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bearer-results.sarif
